    <!-- Rare events: Shooting star and drifting satellite -->
  <g id="rare-events">
    <!-- Shooting star -->
    <g id="shooting-star" opacity="0" filter="url(#glow)">
      <line x1="0" y1="0" x2="28" y2="0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="3s; 12s; 20s; 35s"/>
      <animateMotion dur="1.5s" begin="3s; 33s; 61s; 97s" path="M -80 140 L 680 20" rotate="auto"/>
    </g>

    <!-- Satellite (slow diagonal drift) -->
    <g id="satellite" transform="translate(-80,420)">
      <!-- Body -->
      <g id="sat-body">
        <rect x="-6" y="-4" width="12" height="8" rx="2" fill="#b6c2d0" stroke="#e6edf3" stroke-width="0.6"/>
        <!-- Antenna -->
        <line x1="0" y1="-4" x2="0" y2="-10" stroke="#e6edf3" stroke-width="0.6"/>
        <circle cx="0" cy="-11.5" r="1" fill="#e6edf3"/>
      </g>
      <!-- Solar panels -->
      <rect x="-18" y="-3.5" width="10" height="7" rx="1" fill="#6aa3ff" opacity="0.9"/>
      <rect x="8" y="-3.5" width="10" height="7" rx="1" fill="#6aa3ff" opacity="0.9"/>
      <animateTransform attributeName="transform" type="translate" from="-10 420" to="680 -50" dur="120s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-6 0 0; 6 0 0; -6 0 0" dur="24s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <!-- Name and Tagline -->
  <g id="header-text" transform="translate(0, 80)">
    <text
      x="50%"
      text-anchor="middle"
      fill="#5448c8"
      font-size="42"
      font-family="sans-serif"
      filter="url(#nameGlow)"
      style="font-weight: bold;"
    >Patrick Gatewood</text>
    <text
      x="50%"
      y="40"
      text-anchor="middle"
      fill="#a5b4fc"
      font-size="16"
      font-family="sans-serif"
    >👨‍💻 Probably clacking on his keyboard at 2 AM</text>
  </g>

  <!-- Project Logos (scattered, gentle drift/rotation) -->
  <g id="logos" class="logo" transform="translate(0,60)">
    <!-- Emochi -->
    <g id="logo-emochi" transform="translate(60,320)">
      <image href="images/emochi.png" xlink:href="images/emochi.png" width="96" height="96"/>
      <animateTransform attributeName="transform" type="translate" values="60 320; 66 316; 56 322; 60 320" dur="38s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-2 48 48; 2 48 48; -2 48 48" dur="80s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Vocable -->
    <g id="logo-vocable" transform="translate(460,130)">
