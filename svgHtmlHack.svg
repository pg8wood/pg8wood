      <animateTransform attributeName="transform" type="translate" values="460 130; 455 136; 462 128; 460 130" dur="44s" begin="-7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="1.5 44 44; -1.5 44 44; 1.5 44 44" dur="72s" begin="-9s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Recipe Nabber -->
    <g id="logo-recipe-nabber" transform="translate(330,350)">
      <image href="images/recipe-nabber.png" xlink:href="images/recipe-nabber.png" width="84" height="84"/>
      <animateTransform attributeName="transform" type="translate" values="330 350; 336 344; 328 352; 330 350" dur="36s" begin="-3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-1.8 42 42; 1.8 42 42; -1.8 42 42" dur="64s" begin="-12s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Changelog Generator -->
    <g id="logo-changelog" transform="translate(120,140)">
      <image href="images/changelog.png" xlink:href="images/changelog.png" width="82" height="82"/>
      <animateTransform attributeName="transform" type="translate" values="120 140; 118 146; 122 138; 120 140" dur="40s" begin="-15s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="2 41 41; -2 41 41; 2 41 41" dur="70s" begin="-5s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- OSRS Touch Bar -->
    <g id="logo-osrs-touch-bar" transform="translate(260,100)">
      <image href="images/osrs-touch-bar.png" xlink:href="images/osrs-touch-bar.png" width="95" height="60"/>
      <animateTransform attributeName="transform" type="translate" values="260 100; 266 104; 258 106; 260 100" dur="48s" begin="-21s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-1.5 47.5 30; 1.5 47.5 30; -1.5 47.5 30" dur="76s" begin="-18s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Charles Janitor -->
