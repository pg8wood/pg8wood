<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="1550" viewBox="0 0 800 1550" role="img" aria-label="Patrick Gatewood's Interstellar Portfolio">
  <title>Patrick Gatewood • Cosmic Engineer Portfolio</title>

  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#04070f"/>
    </radialGradient>

    <filter id="glow" filterUnits="userSpaceOnUse" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nameGlow" filterUnits="userSpaceOnUse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Punchy Purple Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <style>
    .bg { fill: url(#spaceGradient); }
    .star { fill: #ffffff; }
    .header-name { fill: url(#textGradient); font-family: sans-serif; font-weight: bold; font-size: 48px; }
    .header-tagline { fill: #94a3b8; font-family: sans-serif; font-size: 18px; }
    .section-title { fill: #f8fafc; font-family: sans-serif; font-weight: bold; font-size: 24px; }
    .card-bg { fill: rgba(255, 255, 255, 0.03); stroke: rgba(255, 255, 255, 0.1); stroke-width: 1; }
    .card-title { fill: #f1f5f9; font-family: sans-serif; font-weight: bold; font-size: 16px; }
    .card-desc { fill: #94a3b8; font-family: sans-serif; font-size: 13px; }
    .project-title { fill: #ffffff; font-family: sans-serif; font-weight: bold; font-size: 18px; }
    .project-desc { fill: #94a3b8; font-family: sans-serif; font-size: 14px; }
    .link-text { fill: #818cf8; font-family: sans-serif; font-weight: bold; font-size: 12px; }
  </style>

  <!-- Background Layer -->
  <rect class="bg" width="100%" height="100%" rx="25"/>
  
  <!-- Drifting Background Stars -->
  <g opacity="0.3" filter="url(#glow)">
    <circle class="star" cx="100" cy="150" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle class="star" cx="700" cy="400" r="1.2"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle class="star" cx="400" cy="800" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle class="star" cx="200" cy="1100" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle class="star" cx="600" cy="1400" r="1.5"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Project Logos Drifting in the Void -->
  <g opacity="0.08">
    <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/emochi.png" x="50" y="300" width="120" height="120">
      <animateTransform attributeName="transform" type="translate" values="0 0; 20 -20; 0 0" dur="40s" repeatCount="indefinite" additive="sum"/>
    </image>
    <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/recipe-nabber.png" x="600" y="700" width="110" height="110">
      <animateTransform attributeName="transform" type="translate" values="0 0; -30 20; 0 0" dur="45s" repeatCount="indefinite" additive="sum"/>
    </image>
    <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/chosen-one.png" x="100" y="1200" width="130" height="130">
      <animateTransform attributeName="transform" type="translate" values="0 0; 15 30; 0 0" dur="50s" repeatCount="indefinite" additive="sum"/>
    </image>
  </g>

  <!-- Header Section -->
  <g transform="translate(400, 100)">
    <text text-anchor="middle" class="header-name" filter="url(#nameGlow)">Patrick Gatewood</text>
    <text y="40" text-anchor="middle" class="header-tagline">Enterprise iOS engineer by day, indie app maker by night.</text>
    <text y="70" text-anchor="middle" class="header-tagline">Founder of <tspan font-weight="bold" fill="#fff">Robot Hand, LLC</tspan></text>
  </g>

  <!-- How I Build Section -->
  <g transform="translate(40, 220)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <text y="40" class="section-title">🔨 How I Build</text>
    
    <g transform="translate(0, 65)">
      <rect width="230" height="120" rx="16" class="card-bg"/>
      <text x="115" y="40" text-anchor="middle" font-size="32">🏢</text>
      <text x="115" y="75" text-anchor="middle" class="card-title">At Scale</text>
      <text x="115" y="95" text-anchor="middle" class="card-desc">Systems used by millions</text>
    </g>
    
    <g transform="translate(245, 65)">
      <rect width="230" height="120" rx="16" class="card-bg"/>
      <text x="115" y="40" text-anchor="middle" font-size="32">🤖</text>
      <text x="115" y="75" text-anchor="middle" class="card-title">Independently</text>
      <text x="115" y="95" text-anchor="middle" class="card-desc">Crafting tools at Robot Hand</text>
    </g>
    
    <g transform="translate(490, 65)">
      <rect width="230" height="120" rx="16" class="card-bg"/>
      <text x="115" y="40" text-anchor="middle" font-size="32">🧪</text>
      <text x="115" y="75" text-anchor="middle" class="card-title">Personally</text>
      <text x="115" y="95" text-anchor="middle" class="card-desc">Well-crafted apps &amp; tools</text>
    </g>
  </g>

  <!-- Enterprise Work Section -->
  <g transform="translate(40, 480)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <text y="40" class="section-title">💼 Enterprise Work</text>
    
    <g transform="translate(0, 65)">
      <rect width="350" height="140" rx="16" class="card-bg"/>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/square-logo.png" x="20" y="20" width="48" height="48"/>
      <text x="80" y="40" class="project-title">Square</text>
      <text x="80" y="65" class="project-desc">Core iOS infrastructure, AI tooling,</text>
      <text x="80" y="85" class="project-desc">and transaction security for</text>
      <text x="80" y="105" class="project-desc">millions of sellers.</text>
    </g>
    
    <g transform="translate(370, 65)">
      <rect width="350" height="140" rx="16" class="card-bg"/>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/willowtree-logo.svg" x="20" y="20" width="48" height="48"/>
      <text x="80" y="40" class="project-title">WillowTree</text>
      <text x="80" y="65" class="project-desc">Architecting digital experiences</text>
      <text x="80" y="85" class="project-desc">for FOX, PepsiCo, and other</text>
      <text x="80" y="105" class="project-desc">global brands.</text>
    </g>
  </g>

  <!-- Project Hall of Fame Section -->
  <g transform="translate(40, 750)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <text y="40" class="section-title">🥇 Project Hall of Fame</text>
    
    <g transform="translate(0, 65)">
      <rect width="350" height="200" rx="20" class="card-bg" fill="rgba(13, 17, 23, 0.6)"/>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/chosen-one.png" x="20" y="20" width="64" height="64"/>
      <text x="100" y="45" class="project-title">Chosen One</text>
      <text x="100" y="75" class="project-desc">Fast, no-nonsense finger chooser.</text>
      <text x="100" y="95" class="project-desc">Touch the screen. Get picked.</text>
      <text x="20" y="135" class="link-text">fingerchooser.app</text>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/download-on-the-app-store.svg" x="20" y="150" height="32"/>
    </g>

    <g transform="translate(370, 65)">
      <rect width="350" height="200" rx="20" class="card-bg" fill="rgba(13, 17, 23, 0.6)"/>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/emochi.png" x="20" y="20" width="64" height="64"/>
      <text x="100" y="45" class="project-title">Emochi</text>
      <text x="100" y="75" class="project-desc">Lightning-fast emoji utility for</text>
      <text x="100" y="95" class="project-desc">macOS. The picker you wanted.</text>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/download-on-the-app-store.svg" x="20" y="150" height="32"/>
    </g>

    <g transform="translate(0, 285)">
      <rect width="350" height="200" rx="20" class="card-bg" fill="rgba(13, 17, 23, 0.6)"/>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/recipe-nabber.png" x="20" y="20" width="64" height="64"/>
      <text x="100" y="45" class="project-title">Recipe Nabber</text>
      <text x="100" y="75" class="project-desc">Skip the life stories. Strips ads</text>
      <text x="100" y="95" class="project-desc">and popups so you can cook.</text>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/download-on-the-app-store.svg" x="20" y="150" height="32"/>
    </g>

    <g transform="translate(370, 285)">
      <rect width="350" height="200" rx="20" class="card-bg" fill="rgba(13, 17, 23, 0.6)"/>
      <text x="25" y="45" class="project-title">Taipo</text>
      <text x="25" y="75" class="project-desc">AI-powered CLI that catches and</text>
      <text x="25" y="95" class="project-desc">fixes command typos via LLMs.</text>
      <text x="25" y="160" class="link-text">github.com/pg8wood/taipo</text>
    </g>

    <g transform="translate(0, 505)">
      <rect width="350" height="140" rx="20" class="card-bg" fill="rgba(13, 17, 23, 0.6)"/>
      <text x="25" y="45" class="project-title">slog</text>
      <text x="25" y="75" class="project-desc">Automate your iOS Simulator</text>
      <text x="25" y="95" class="project-desc">login flows and get back to work.</text>
      <text x="25" y="120" class="link-text">github.com/pg8wood/slog</text>
    </g>

    <g transform="translate(370, 505)">
      <rect width="350" height="140" rx="20" class="card-bg" fill="rgba(13, 17, 23, 0.6)"/>
      <image href="https://raw.githubusercontent.com/pg8wood/pg8wood/main/images/changelog.png" x="20" y="20" width="48" height="48"/>
      <text x="80" y="45" class="project-title">Changelog Generator</text>
      <text x="80" y="75" class="project-desc">Curbs cumbersome conflicts.</text>
      <text x="80" y="95" class="project-desc">Built for high-velocity teams.</text>
    </g>
  </g>

  <g id="satellite" transform="translate(-80,420)">
    <rect x="-6" y="-4" width="12" height="8" rx="2" fill="#b6c2d0" stroke="#e6edf3" stroke-width="0.6"/>
    <rect x="-18" y="-3.5" width="10" height="7" rx="1" fill="#6aa3ff" opacity="0.9"/>
    <rect x="8" y="-3.5" width="10" height="7" rx="1" fill="#6aa3ff" opacity="0.9"/>
    <animateTransform attributeName="transform" type="translate" from="-50 72" to="850 -50" dur="120s" repeatCount="indefinite"/>
  </g>
</svg>
