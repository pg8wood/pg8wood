<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="1000" viewBox="0 0 600 1000" role="img" aria-label="Interstellar dashboard of project logos drifting in space">
  <title>Interstellar Dashboard • Project Logos in Deep Space</title>

  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#04070f"/>
    </radialGradient>

    <filter id="glow" filterUnits="userSpaceOnUse" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>

    <!-- Name Glow Filter -->
    <filter id="nameGlow" filterUnits="userSpaceOnUse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

    <style>
    /* General */
    .bg { fill: url(#spaceGradient); }
    .star { fill: #ffffff; opacity: 0.9; }
    .star.dim { opacity: 0.55; }
    .constellation { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 0.5; }

    /* Logo emphasis */
    .logo image { filter: url(#softGlow); }

    /* Accessibility/Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .no-reduce { animation: none !important; }
      }
    </style>
   
  <!-- Background -->
  <g id="background">
    <rect class="bg" x="0" y="0" width="100%" height="1000"/>
  </g>

