<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Interstellar dashboard of project logos drifting in space">
  <title>Interstellar Dashboard • Project Logos in Deep Space</title>

  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#04070f"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <style>
    /* General */
    .bg { fill: url(#spaceGradient); }
    .star { fill: #ffffff; opacity: 0.9; }
    .star.dim { opacity: 0.55; }
    .constellation { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 0.5; }

    /* Logo emphasis */
    .logo image { filter: url(#softGlow); }

    /* Accessibility/Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .no-reduce { animation: none !important; }
    }
  </style>

  <!-- Background -->
  <g id="background">
    <rect class="bg" x="0" y="0" width="600" height="400" rx="12"/>
  </g>

  <!-- Starfield -->
  <g id="stars" filter="url(#glow)">
    <!-- A scattering of stars with independent twinkle -->
    <circle class="star" cx="40" cy="30" r="1.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="-1.1s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="120" cy="60" r="0.9">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="4.4s" begin="-2.3s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="200" cy="40" r="1.0">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" begin="-0.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="300" cy="35" r="0.7">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.8s" begin="-1.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="380" cy="50" r="1.1">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.4s" begin="-2.1s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="540" cy="38" r="0.9">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.1s" begin="-1.9s" repeatCount="indefinite"/>
    </circle>

    <circle class="star dim" cx="70" cy="110" r="0.8">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.2s" begin="-0.7s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="160" cy="120" r="1.2">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.1s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="255" cy="115" r="1.0">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.7s" begin="-2.7s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="320" cy="105" r="0.7">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="4.9s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="410" cy="120" r="1.3">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" begin="-0.9s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="570" cy="115" r="0.8">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.3s" begin="-2.2s" repeatCount="indefinite"/>
    </circle>

    <circle class="star" cx="30" cy="200" r="1.0">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" begin="-2.1s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="95" cy="185" r="0.7">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.6s" begin="-1.0s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="180" cy="210" r="1.1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" begin="-1.7s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="245" cy="190" r="0.8">
      <animate attributeName="opacity" values="0.15;0.75;0.15" dur="4.4s" begin="-2.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="330" cy="200" r="1.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="420" cy="190" r="0.7">
      <animate attributeName="opacity" values="0.12;0.65;0.12" dur="4.7s" begin="-1.4s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="520" cy="210" r="1.1">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.5s" begin="-2.5s" repeatCount="indefinite"/>
    </circle>

    <circle class="star dim" cx="70" cy="275" r="0.8">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.8s" begin="-1.9s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="150" cy="300" r="1.2">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.3s" begin="-0.9s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="240" cy="310" r="1.0">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="-2.9s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="315" cy="295" r="0.7">
      <animate attributeName="opacity" values="0.12;0.7;0.12" dur="4.9s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="star" cx="395" cy="305" r="1.1">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.7s" begin="-1.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="star dim" cx="565" cy="290" r="0.9">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="4.2s" begin="-2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Rare events: Shooting star and drifting satellite -->
  <g id="rare-events">
    <!-- Shooting star -->
    <g id="shooting-star" opacity="0" filter="url(#glow)">
      <line x1="0" y1="0" x2="18" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <animate id="shootOpacity" attributeName="opacity" values="0;1;0" dur="1.3s" begin="7s; 33s; 61s; 97s"/>
      <animateMotion id="shootPass" dur="1.3s" begin="7s; 33s; 61s; 97s" path="M -60 90 L 660 -40" rotate="auto"/>
    </g>

    <!-- Satellite (slow diagonal drift) -->
    <g id="satellite" transform="translate(-80,420)">
      <!-- Body -->
      <g id="sat-body">
        <rect x="-6" y="-4" width="12" height="8" rx="2" fill="#b6c2d0" stroke="#e6edf3" stroke-width="0.6"/>
        <!-- Antenna -->
        <line x1="0" y1="-4" x2="0" y2="-10" stroke="#e6edf3" stroke-width="0.6"/>
        <circle cx="0" cy="-11.5" r="1" fill="#e6edf3"/>
      </g>
      <!-- Solar panels -->
      <rect x="-18" y="-3.5" width="10" height="7" rx="1" fill="#6aa3ff" opacity="0.9"/>
      <rect x="8" y="-3.5" width="10" height="7" rx="1" fill="#6aa3ff" opacity="0.9"/>
      <animateTransform attributeName="transform" type="translate" from="-80 420" to="680 -50" dur="120s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-6 0 0; 6 0 0; -6 0 0" dur="24s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <!-- Project Logos (scattered, gentle drift/rotation) -->
  <g id="logos" class="logo">
    <!-- Emochi -->
    <g id="logo-emochi" transform="translate(60,260)">
      <image href="images/emochi.png" xlink:href="images/emochi.png" width="96" height="96"/>
      <animateTransform attributeName="transform" type="translate" values="60 260; 66 256; 56 262; 60 260" dur="38s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-2 48 48; 2 48 48; -2 48 48" dur="80s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Vocable -->
    <g id="logo-vocable" transform="translate(460,70)">
      <image href="images/vocable.png" xlink:href="images/vocable.png" width="88" height="88"/>
      <animateTransform attributeName="transform" type="translate" values="460 70; 455 76; 462 68; 460 70" dur="44s" begin="-7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="1.5 44 44; -1.5 44 44; 1.5 44 44" dur="72s" begin="-9s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Recipe Nabber -->
    <g id="logo-recipe-nabber" transform="translate(330,290)">
      <image href="images/recipe-nabber.png" xlink:href="images/recipe-nabber.png" width="84" height="84"/>
      <animateTransform attributeName="transform" type="translate" values="330 290; 336 284; 328 292; 330 290" dur="36s" begin="-3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-1.8 42 42; 1.8 42 42; -1.8 42 42" dur="64s" begin="-12s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Changelog Generator -->
    <g id="logo-changelog" transform="translate(120,80)">
      <image href="images/changelog.png" xlink:href="images/changelog.png" width="82" height="82"/>
      <animateTransform attributeName="transform" type="translate" values="120 80; 118 86; 122 78; 120 80" dur="40s" begin="-15s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="2 41 41; -2 41 41; 2 41 41" dur="70s" begin="-5s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- OSRS Touch Bar -->
    <g id="logo-osrs-touch-bar" transform="translate(260,40)">
      <image href="images/osrs-touch-bar.png" xlink:href="images/osrs-touch-bar.png" width="95" height="60"/>
      <animateTransform attributeName="transform" type="translate" values="260 40; 266 44; 258 46; 260 40" dur="48s" begin="-21s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-1.5 47.5 30; 1.5 47.5 30; -1.5 47.5 30" dur="76s" begin="-18s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- Charles Janitor -->
    <g id="logo-charles-janitor" transform="translate(430,250)">
      <image href="images/charles-janitor.png" xlink:href="images/charles-janitor.png" width="90" height="90"/>
      <animateTransform attributeName="transform" type="translate" values="430 250; 436 252; 428 256; 430 250" dur="52s" begin="-27s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="1.2 45 45; -1.2 45 45; 1.2 45 45" dur="84s" begin="-24s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

</svg>
